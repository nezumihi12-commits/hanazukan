<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>花図鑑 — 1000属検定C級</title>
<!-- Firebase SDK (compat版・scriptタグで読み込み) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js" onerror="console.warn('Firebase SDK load failed')"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js" onerror="console.warn('Firebase Auth load failed')"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js" onerror="console.warn('Firebase Firestore load failed')"></script>
<script src="https://cdn.jsdelivr.net/npm/exifr/dist/full.umd.js" onerror="console.warn('exifr load failed')"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1a14;
    --surface: #1a2a1f;
    --surface2: #223028;
    --border: #2e4a38;
    --accent: #5dba7a;
    --accent2: #a8e6bc;
    --warn: #e8a84a;
    --danger: #e85a5a;
    --text: #e8f0eb;
    --text2: #8aab95;
    --text3: #4a6b55;
    --gold: #d4af37;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }
  nav {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    order: 999;
  }
  nav button {
    flex: 1; padding: 12px 4px 10px;
    background: none; border: none; color: var(--text3);
    font-family: 'Shippori Mincho', serif; font-size: 12px;
    cursor: pointer; transition: color .2s;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
  }
  nav button .nav-icon { font-size: 20px; }
  nav button.active { color: var(--accent); }
  .screen { display: none; flex: 1; overflow-y: auto; flex-direction: column; }
  .screen.active { display: flex; }

  /* HOME */
  #home { padding: 20px 16px; gap: 16px; }
  .home-header { text-align: center; padding: 8px 0; }
  .home-header h1 { font-family: 'Shippori Mincho', serif; font-size: 24px; font-weight: 800; color: var(--accent2); }
  .home-header p { font-size: 11px; color: var(--text3); margin-top: 3px; letter-spacing: .08em; }
  .progress-ring-wrap { display: flex; justify-content: center; align-items: center; gap: 24px; }
  .ring-container { position: relative; width: 110px; height: 110px; }
  .ring-container svg { transform: rotate(-90deg); }
  .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring-center .num { font-family: 'Shippori Mincho', serif; font-size: 26px; font-weight: 800; color: var(--accent); }
  .ring-center .denom { font-size: 10px; color: var(--text3); }
  .ring-stats { display: flex; flex-direction: column; gap: 10px; }
  .stat-item .label { font-size: 10px; color: var(--text3); }
  .stat-item .value { font-size: 17px; color: var(--text); font-weight: 500; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
  .card-title { font-family: 'Shippori Mincho', serif; font-size: 12px; color: var(--text2); letter-spacing: .06em; margin-bottom: 10px; }
  .btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 14px; border-radius: var(--radius-sm); border: none; font-family: 'Shippori Mincho', serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity .15s, transform .1s; }
  .btn:active { opacity: .75; transform: scale(.98); }
  .btn-primary { background: var(--accent); color: #0f1a14; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .mode-btn { background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px 8px; color: var(--text); font-family: 'Shippori Mincho', serif; font-size: 12px; cursor: pointer; text-align: center; transition: all .2s; line-height: 1.4; }
  .mode-btn .mode-icon { font-size: 20px; display: block; margin-bottom: 4px; }
  .mode-btn.selected { border-color: var(--accent); background: #1e3a28; }
  .science-badge { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--surface2); border-radius: var(--radius-sm); border-left: 3px solid var(--gold); }
  .science-badge .info { font-size: 11px; color: var(--text2); line-height: 1.5; }
  .science-badge .info strong { color: var(--gold); }

  /* QUIZ */
  #quiz { padding: 0; }
  .quiz-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .quiz-progress-bar { height: 3px; background: var(--border); flex-shrink: 0; }
  .quiz-progress-fill { height: 100%; background: var(--accent); transition: width .3s; }
  .quiz-counter { font-size: 12px; color: var(--text2); }
  .quiz-score-live { font-size: 12px; color: var(--accent); font-weight: 500; }
  .quiz-exit { background: none; border: none; color: var(--text3); font-size: 20px; cursor: pointer; padding: 4px; }
  .quiz-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
  .question-type-badge { display: inline-block; font-size: 10px; letter-spacing: .1em; color: var(--text3); background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; align-self: flex-start; }
  .question-text { font-family: 'Shippori Mincho', serif; font-size: 20px; font-weight: 600; line-height: 1.5; }
  .question-hint { font-size: 12px; color: var(--text3); background: var(--surface2); border-radius: var(--radius-sm); padding: 8px 12px; line-height: 1.6; }
  .answer-fields { display: flex; flex-direction: column; gap: 10px; }
  .field-label { font-size: 11px; color: var(--text3); letter-spacing: .06em; margin-bottom: 4px; }
  .answer-input { width: 100%; background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: 'DM Mono', monospace; font-size: 16px; padding: 13px 12px; outline: none; transition: border-color .2s; -webkit-appearance: none; }
  .answer-input:focus { border-color: var(--accent); }
  .answer-input.correct { border-color: var(--accent); background: #1a3525; }
  .answer-input.partial { border-color: var(--warn); background: #2a2010; }
  .answer-input.wrong { border-color: var(--danger); background: #2a1515; }
  .feedback-box { border-radius: var(--radius-sm); padding: 12px; font-size: 13px; line-height: 1.7; display: none; }
  .feedback-box.show { display: block; }
  .feedback-box.correct { background: #1a3525; border: 1px solid var(--accent); }
  .feedback-box.partial { background: #2a2010; border: 1px solid var(--warn); }
  .feedback-box.wrong { background: #2a1515; border: 1px solid var(--danger); }
  .feedback-box .correct-ans { color: var(--accent2); font-weight: 500; }
  .feedback-note { font-size: 11px; color: var(--text3); margin-top: 6px; }
  .quiz-footer { padding: 12px 14px; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }

  /* RESULT */
  .result-screen { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 28px 20px; gap: 16px; position: absolute; inset: 0; background: var(--bg); overflow-y: auto; }
  .result-screen.show { display: flex; }
  .result-emoji { font-size: 52px; }
  .result-score-big { font-family: 'Shippori Mincho', serif; font-size: 48px; font-weight: 800; color: var(--accent); }
  .result-score-big span { font-size: 18px; color: var(--text2); }
  .result-detail { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; display: flex; flex-direction: column; gap: 8px; }
  .result-row { display: flex; justify-content: space-between; font-size: 13px; }
  .result-row .lbl { color: var(--text3); }
  .result-row .val { color: var(--text); }

  /* ZUKAN */
  #zukan { padding: 0; }
  .zukan-header { padding: 10px 14px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; }
  .zukan-search { width: 100%; background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; padding: 9px 12px; outline: none; }
  .zukan-search:focus { border-color: var(--accent); }
  .filter-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-chip { flex-shrink: 0; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); font-size: 12px; cursor: pointer; white-space: nowrap; transition: all .2s; }
  .filter-chip.active { background: var(--accent); color: #0f1a14; border-color: var(--accent); font-weight: 600; }
  .zukan-grid { flex: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; align-content: start; -webkit-overflow-scrolling: touch; }
  .zukan-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px; cursor: pointer; transition: border-color .2s, transform .1s; display: flex; flex-direction: column; align-items: center; gap: 2px; height: 118px; overflow: hidden; position: relative; justify-content: space-between; }
  .zukan-card:active { transform: scale(.95); }
  .zukan-card.has-photo { border-color: var(--accent2); }
  .zukan-card .card-thumb { width: 100%; height: 46px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
  .zukan-card .card-text { display: flex; flex-direction: column; align-items: center; gap: 2px; width: 100%; padding-bottom: 4px; }
  .zukan-card .card-latin { font-size: 9px; font-style: italic; color: var(--text2); text-align: center; line-height: 1.2; word-break: break-all; width: 100%; }
  .zukan-card .card-fam { font-family: 'Shippori Mincho', serif; font-size: 9px; color: var(--text3); text-align: center; width: 100%; }
  .zukan-card .card-jp { font-family: 'Shippori Mincho', serif; font-size: 9px; color: var(--text2); text-align: center; width: 100%; }
  .mastery-dot { width: 5px; height: 5px; border-radius: 50%; position: absolute; top: 4px; left: 4px; }
  .mastery-dot.m0 { background: var(--text3); }
  .mastery-dot.m1 { background: var(--warn); }
  .mastery-dot.m2 { background: var(--accent); }
  .mastery-dot.m3 { background: var(--gold); }
  .photo-badge { position: absolute; top: 3px; right: 3px; font-size: 9px; background: rgba(0,0,0,.55); border-radius: 3px; padding: 1px 3px; color: var(--accent2); }

  /* 錠前アイコン（CSS製） */
  .lock-icon-css {
    position: relative;
    width: 16px;
    height: 12px;
    background: #3a5240;
    border-radius: 2.5px;
    margin-top: 8px;
  }
  .lock-icon-css::before {
    content: '';
    position: absolute;
    top: -8px; left: 50%;
    transform: translateX(-50%);
    width: 10px; height: 9px;
    border: 2.5px solid #3a5240;
    border-bottom: none;
    border-radius: 5px 5px 0 0;
    box-sizing: border-box;
  }
  .lock-icon-css::after {
    content: '';
    position: absolute;
    top: 3px; left: 50%;
    transform: translateX(-50%);
    width: 4px; height: 4px;
    background: #1a2a1f;
    border-radius: 50%;
    box-shadow: 0 2.5px 0 #1a2a1f;
  }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 100; align-items: flex-end; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal-sheet { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; max-height: 92dvh; overflow-y: auto; padding: 16px 18px 36px; display: flex; flex-direction: column; gap: 14px; animation: slideUp .22s ease; -webkit-overflow-scrolling: touch; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; align-self: center; margin-bottom: 2px; }
  .modal-latin { font-style: italic; font-size: 22px; color: var(--accent2); }
  .modal-sub { font-family: 'Shippori Mincho', serif; font-size: 13px; color: var(--text2); margin-top: -6px; }
  .modal-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .info-item { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px 11px; }
  .info-item .lbl { font-size: 10px; color: var(--text3); margin-bottom: 2px; }
  .info-item .val { font-size: 13px; color: var(--text); line-height: 1.4; }
  .info-item.full { grid-column: 1/-1; }
  .modal-note { font-size: 12px; color: var(--text2); background: var(--surface2); border-left: 3px solid var(--border); padding: 9px 12px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; line-height: 1.6; }

  /* PHOTOS */
  .section-label { font-size: 11px; color: var(--text3); letter-spacing: .06em; }
  .inat-photos { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
  .inat-photos::-webkit-scrollbar { display: none; }
  .inat-photo-wrap { flex-shrink: 0; position: relative; }
  .inat-photo { width: 90px; height: 90px; object-fit: cover; border-radius: var(--radius-sm); border: 1px solid var(--border); cursor: pointer; }
  .inat-badge { position: absolute; bottom: 3px; left: 3px; font-size: 9px; background: rgba(0,0,0,.7); color: #aaa; border-radius: 3px; padding: 1px 4px; }
  .inat-loading { font-size: 12px; color: var(--text3); padding: 8px 0; }

  .my-photos-grid { display: flex; gap: 6px; flex-wrap: wrap; }
  .my-photo-wrap { position: relative; width: 90px; height: 90px; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border); cursor: pointer; }
  .my-photo { width: 100%; height: 100%; object-fit: cover; }
  .photo-delete { position: absolute; top: 3px; right: 3px; background: rgba(0,0,0,.65); border: none; color: #fff; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .photo-add-btn { width: 90px; height: 90px; border: 1.5px dashed var(--border); border-radius: var(--radius-sm); background: var(--surface2); color: var(--text3); font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; flex-shrink: 0; }
  .photo-add-btn:active { border-color: var(--accent); color: var(--accent); }

  .source-row { display: flex; gap: 7px; }
  .source-link { flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px; padding: 9px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text2); font-size: 12px; text-decoration: none; }
  .location-row { display: flex; align-items: center; gap: 8px; background: var(--surface2); border-radius: var(--radius-sm); padding: 9px 11px; cursor: pointer; }
  .location-text { font-size: 12px; color: var(--text2); flex: 1; line-height: 1.4; }
  .location-btn { padding: 5px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text2); font-size: 11px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  #mMapArea { width: 100%; height: 180px; border-radius: var(--radius-sm); overflow: hidden; display: none; margin-top: 6px; border: 1px solid var(--border); }
  .leaflet-container { background: var(--surface2); }
  .mastery-row { display: flex; gap: 6px; }
  .mastery-btn { flex: 1; padding: 8px 4px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--surface2); color: var(--text2); font-size: 11px; cursor: pointer; text-align: center; transition: all .2s; line-height: 1.4; }
  .mastery-btn.active-m1 { border-color: var(--warn); color: var(--warn); background: #2a2010; }
  .mastery-btn.active-m2 { border-color: var(--accent); color: var(--accent); background: #1a3525; }
  .mastery-btn.active-m3 { border-color: var(--gold); color: var(--gold); background: #2a2010; }

  /* STATS */
  #stats { padding: 18px 14px; gap: 14px; }
  .stats-title { font-family: 'Shippori Mincho', serif; font-size: 17px; font-weight: 800; color: var(--accent2); }
  .science-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .science-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
  .science-card .sc-label { font-size: 10px; color: var(--text3); }
  .science-card .sc-val { font-family: 'Shippori Mincho', serif; font-size: 22px; font-weight: 800; color: var(--text); }
  .science-card .sc-sub { font-size: 11px; color: var(--text2); }
  .history-list { display: flex; flex-direction: column; gap: 7px; }
  .history-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 13px; display: flex; justify-content: space-between; align-items: center; }
  .history-item .date { font-size: 11px; color: var(--text3); }
  .history-item .score { font-size: 14px; color: var(--accent); font-weight: 500; }
  .history-item .hmode { font-size: 11px; color: var(--text2); }
  .empty-state { text-align: center; color: var(--text3); font-size: 13px; padding: 28px; line-height: 1.8; }
  .save-status { font-size: 10px; color: var(--text3); text-align: right; }

  /* FULLSCREEN（スワイプ対応） */
  .fullscreen-photo { display: none; position: fixed; inset: 0; background: #000; z-index: 300; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
  .fullscreen-photo.show { display: flex; }
  .fullscreen-slide { display: flex; width: 100%; height: 100%; transition: transform .25s ease; }
  .fullscreen-slide img { flex-shrink: 0; width: 100%; height: 100%; object-fit: contain; }
  .fullscreen-close { position: absolute; top: 16px; right: 16px; background: rgba(0,0,0,.6); border: none; color: #fff; font-size: 22px; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 1; }
  .fullscreen-counter { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); font-size: 12px; color: rgba(255,255,255,.7); background: rgba(0,0,0,.4); border-radius: 12px; padding: 3px 10px; }

  .toast { position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 7px 16px; font-size: 13px; color: var(--text); z-index: 200; opacity: 0; transition: opacity .3s; white-space: nowrap; pointer-events: none; }
  .toast.show { opacity: 1; }

  /* 問題写真スワイプ */
  .quiz-photos {
    position: relative;
    width: 100%;
    height: 200px;
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--surface2);
    touch-action: pan-y;
  }
  .quiz-photo-slide {
    display: flex;
    height: 100%;
    transition: transform .25s ease;
  }
  .quiz-photo-slide img {
    flex-shrink: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .quiz-photo-dots {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 5px;
  }
  .quiz-photo-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,.4);
    transition: background .2s;
  }
  .quiz-photo-dot.active { background: #fff; }
  .quiz-photo-count {
    position: absolute;
    top: 8px; right: 8px;
    font-size: 11px;
    background: rgba(0,0,0,.5);
    color: #fff;
    border-radius: 10px;
    padding: 2px 8px;
  }
  input[type="file"] { display: none; }
</style>
</head>
<body>

<div id="home" class="screen active">
  <div class="home-header">
    <h1>花図鑑</h1>
    <p>1000属検定 C級 学習アプリ</p>
  </div>
  <div class="progress-ring-wrap">
    <div class="ring-container">
      <svg width="110" height="110" viewBox="0 0 110 110">
        <circle cx="55" cy="55" r="46" fill="none" stroke="#2e4a38" stroke-width="9"/>
        <circle id="ringFill" cx="55" cy="55" r="46" fill="none" stroke="#5dba7a" stroke-width="9"
          stroke-dasharray="289" stroke-dashoffset="289" stroke-linecap="round"/>
      </svg>
      <div class="ring-center">
        <span class="num" id="unlockedCount">0</span>
        <span class="denom">/ 300属</span>
        <span class="denom">記憶済み</span>
      </div>
    </div>
    <div class="ring-stats">
      <div class="stat-item"><div class="label">写真登録済み</div><div class="value" id="photoCount">0 属</div></div>
      <div class="stat-item"><div class="label">今日の出題数</div><div class="value" id="todayCount">0 問</div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">出題モード</div>
    <div class="mode-grid" id="modeGrid">

// ========== INDEXED DB（写真専用） ==========
async function openPhotoDB() {
  return new Promise((res) => {  // rejectしない
    try {
      const req = indexedDB.open('hanazukan_photos', 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore('photos');
      req.onsuccess = e => { photoDB = e.target.result; res(); };
      req.onerror = () => { console.warn('IndexedDB開けず、写真機能は無効'); res(); };
    } catch(e) { console.warn('IndexedDB非対応'); res(); }
  });
}
function dbGetPhotos(latin) {
  if (!photoDB) return Promise.resolve([]);
  return new Promise(resolve => {
    try {
      const req = photoDB.transaction('photos','readonly').objectStore('photos').get(latin);
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => resolve([]);
    } catch(e) { resolve([]); }
  });
}
function dbSetPhotos(latin, photos) {
  if (!photoDB) return Promise.resolve();
  return new Promise(resolve => {
    try {
      const tx = photoDB.transaction('photos','readwrite');
      tx.objectStore('photos').put(photos, latin);
      tx.oncomplete = resolve;
      tx.onerror = resolve;
    } catch(e) { resolve(); }
  });
}

async function initFirebase() {
  // Firebase SDKが読み込まれているか確認
  if (typeof firebase === 'undefined' || typeof firebase.initializeApp === 'undefined') {
    document.getElementById('saveStatus').textContent = '💾 ローカル保存中（クラウド未接続）';
    return false;
  }
  try {
    // 既に初期化済みの場合はスキップ
    if (firebase.apps.length === 0) {
      firebase.initializeApp(FIREBASE_CONFIG);
    }
    firebaseAuth = firebase.auth();
    firebaseDb = firebase.firestore();
    firebaseAuth.onAuthStateChanged(async user => {
      currentUser = user;
      updateAuthUI(user);
      if (user) await loadFromFirestore();
    });
    return true;
  } catch(e) {
    document.getElementById('saveStatus').textContent = '💾 ローカル保存中（クラウド未接続）';
    return false;
  }
}

// ========== FIRESTORE 保存・読み込み ==========
async function saveToFirestore() {
  if (!currentUser || !firebaseDb) {
    localStorage.setItem('hanazukan_progress', JSON.stringify({
      unlocked: state.unlocked,
      mastery: state.mastery,
      location: state.location,
      history: state.history,
      accuracy: state.accuracy,
      todayCount: state.todayCount,
      todayDate: state.todayDate,
    }));
    const el = document.getElementById('saveStatus');
    if (el && el.tagName !== 'BUTTON') el.textContent = '💾 ローカル保存済み（未ログイン）';
    return;
  }
  try {
    await firebaseDb.collection('users').doc(currentUser.uid).set({
      unlocked: state.unlocked,
      mastery: state.mastery,
      location: state.location,
      history: state.history.slice(0, 20),
      accuracy: state.accuracy,
      todayCount: state.todayCount,
      todayDate: state.todayDate,
      updatedAt: new Date().toISOString(),
    });
    document.getElementById('saveStatus').textContent = '☁️ ' + new Date().toLocaleTimeString('ja-JP') + ' 保存済み';
  } catch(e) {
    document.getElementById('saveStatus').textContent = '⚠️ 保存エラー';
  }
}

async function loadFromFirestore() {
  if (!currentUser || !firebaseDb) return;
  try {
    const snap = await firebaseDb.collection('users').doc(currentUser.uid).get();
    if (snap.exists) {
      Object.assign(state, snap.data());
      // photoCacheをIndexedDBから再構築
      if (photoDB) {
        for (const g of GENERA) {
          const p = await dbGetPhotos(g.latin);
          if (p.length > 0) state.photoCache[g.latin] = p[0].dataUrl;
        }
      }
      renderHome(); renderZukan(); renderStats();
      showToast('クラウドから読み込みました ☁️');
    } else {
      // Firestoreにデータなし→localStorageから移行
      const local = localStorage.getItem('hanazukan_progress');
      if (local) {
        try {
          Object.assign(state, JSON.parse(local));
          await saveToFirestore();
          showToast('ローカルデータをクラウドに移行しました ☁️');
        } catch(e) {}
      }
    }
  } catch(e) {}
}

async function saveProgress() {
  await saveToFirestore();
}

// ========== CLOUDINARY 写真アップロード ==========
async function uploadToCloudinary(file) {
  const compressed = await compressImage(file, 800, 0.75);
  const res = await fetch(compressed);
  const blob = await res.blob();
  const formData = new FormData();
  formData.append('file', blob);
  formData.append('upload_preset', CLOUDINARY_PRESET);
  formData.append('folder', 'hanazukan');
  const r = await fetch('https://api.cloudinary.com/v1_1/' + CLOUDINARY_CLOUD + '/image/upload', {
    method: 'POST', body: formData,
  });
  const data = await r.json();
  if (data.secure_url) return data.secure_url;
  throw new Error('Cloudinary upload failed');
}

// ========== INIT ==========
async function init() {
  try { await openPhotoDB(); } catch(e) { console.warn('DB init failed', e); }

  // localStorageからとりあえず読み込み（Firebase読み込み前の暫定）
  const local = localStorage.getItem('hanazukan_progress');
  if (local) try { Object.assign(state, JSON.parse(local)); } catch(e) {}

  const today = new Date().toDateString();
  if (state.todayDate !== today) { state.todayCount = 0; state.todayDate = today; }

  // IndexedDBからphotoCacheを再構築してから描画
  if (photoDB) {
    for (const g of GENERA) {
      const p = await dbGetPhotos(g.latin);
      if (p.length > 0) state.photoCache[g.latin] = p[0].dataUrl;
    }
  }

  renderHome();
  renderZukan();
  renderStats();

  // Firebase初期化（GitHub Pages上でのみ動作）
  try {
    await initFirebase();
  } catch(e) {
    document.getElementById('saveStatus').textContent = '💾 ローカル保存中';
  }
}

function updateRange() {
  const fromRaw = document.getElementById('rangeFrom').value;
  const toRaw = document.getElementById('rangeTo').value;
  const from = parseInt(fromRaw);
  const to = parseInt(toRaw);
  if (isNaN(from) || isNaN(to)) return;
  const f = Math.max(1, Math.min(300, from));
  const t = Math.max(f, Math.min(300, to));
  document.getElementById('rangeLabel').textContent = f + '〜' + t + '番目';
  const first = GENERA[f-1]?.latin || '';
  const last = GENERA[t-1]?.latin || '';
  document.getElementById('rangeGenus').textContent = first + ' 〜 ' + last;
  // 範囲をstateに保存
  state.lastRange = { from: f, to: t };
  saveProgress();
}

// noteを種類別に分類
function parseNote(note) {
  const r = { species:[], confusion:[], circulation:[], taxonomy:[], warning:[] };
  if (!note) return r;
  for (const part of note.split('。').map(s=>s.trim()).filter(Boolean)) {
    if (/[ァ-ヶー]+は[A-Z]/.test(part) || /は別属/.test(part)) r.confusion.push(part);
    else if (/の名で流通|旧属名/.test(part)) r.circulation.push(part);
    else if (/から分けられた|とされた|とする見解|以前は|旧版/.test(part)) r.taxonomy.push(part);
    else if (/は不可/.test(part)) r.warning.push(part);
    else if (/[ァ-ヶー]/.test(part)) r.species.push(part);
  }
  return r;
}

// ========== QUIZ ==========
function getPool() {
  let pool;
  if (selectedTarget === 'range') {
    const fromRaw = parseInt(document.getElementById('rangeFrom')?.value)||1;
    const toRaw = parseInt(document.getElementById('rangeTo')?.value)||5;
    const from = Math.max(1, Math.min(300, fromRaw));
    const to = Math.max(from, Math.min(300, toRaw));
    pool = GENERA.slice(from-1, to);
  } else if (selectedTarget === 'weak') {
    pool = GENERA.filter(g => {
    const acc = state.accuracy[g.latin];
    if (!acc) return false; // 未出題は除外
    const modes = ['latin2family','jp2latin','latin2jp'];
    const tried = modes.filter(m => acc[m] && acc[m].total > 0);
    if (tried.length === 0) return false;
    const avg = tried.reduce((s,m) => s + acc[m].correct/acc[m].total, 0) / tried.length;
    return avg < 0.5;
  });
  } else if (selectedTarget === 'photo') {
    pool = GENERA.filter(g => !!state.photoCache[g.latin]);
  } else {
    pool = [...GENERA];
  }
  if (pool.length === 0) pool = [...GENERA];
  return pool;
}

function startQuiz() {
  document.getElementById('resultScreen').classList.remove('show');
  showScreen('quiz', null);
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  let pool = getPool();
  if (selectedMode === 'photo') {
    pool = pool.filter(g => !!state.photoCache[g.latin]);
    if (pool.length === 0) {
      showScreen('home', document.querySelector('nav button:nth-child(1)'));
      showToast('写真が登録された属がありません 📷');
      return;
    }
  }
  // mixed は family2genus を除外
  const modes = selectedMode === 'mixed'
    ? ['latin2family', 'jp2latin', 'latin2jp']
    : [selectedMode];
  quizState = {
    questions: pool.sort(() => Math.random()-.5).slice(0,20).map(g =>
      buildQ(g, modes[Math.floor(Math.random()*modes.length)])),
    current: 0, answered: false, startTime: Date.now()
  };
  renderQ();
}

// 属和名のパターン判定
function getJpInfo(g) {
  let repName = null;
  if (g.note) {
    const noteFirst = g.note.split('。')[0];
    const BAD = [/[ァ-ヶー]+は[A-Z]/, /以前は/, /旧属名/, /とされた/, /とする見解/, /の名で流通/, /を含む/, /から分けられた/, /は不可/, /[A-Z][a-z]+の名/, /ともいう/, /の園芸名/, /は現在は/];
    if (!BAD.some(p => p.test(noteFirst))) {
      const c = noteFirst.split('、')[0].replace(/（[^）]*）/g,'').replace(/\([^)]*\)/g,'').trim();
      if (c && /[ァ-ヶー]/.test(c) && !/[A-Za-z]/.test(c) && c !== g.jpName) repName = c;
    }
  }
  const jpBase = g.jpName.replace('属','').split('：')[0];
  const hasKanji = /[一-龯]/.test(jpBase);
  const isKatakanaOnly = /^[ァ-ヶーa-zA-Z\s]+$/.test(jpBase) && !hasKanji;
  if (isKatakanaOnly && !g.jpName.includes('属')) {
    return { pattern: 'C', jpName: g.jpName, answers: [g.jpName], suffix: '' };
  }
  if (repName) {
    const base = g.jpName.replace('属','');
    return { pattern: 'B', jpName: g.jpName, answers: [base, repName, g.jpName], suffix: '属' };
  }
  const base = g.jpName.replace('属','');
  return { pattern: 'A', jpName: g.jpName, answers: [base, g.jpName], suffix: '属' };
}

function buildQ(g, mode) {
  const hasPhoto = !!state.photoCache[g.latin];
  const jpInfo = getJpInfo(g);

  if (mode === 'family2genus') {
    const fg = GENERA.filter(x=>x.family===g.family);
    return {
      genus: g, mode,
      type: '科名→属名列挙',
      prompt: g.family,
      hint: 'C級リストで ' + fg.length + ' 属あります',
      hintHidden: false,
      photos: false,
      fields: [{
        label: 'この科に含まれる属名をすべて答えなさい',
        suffix: '',
        answer: fg.map(x=>x.latin).join('、'),
        multi: true, famGenera: fg, type: 'multi', inputmode: 'latin'
      }]
    };
  }

  if (mode === 'latin2family') {
    return {
      genus: g, mode,
      type: '属名→科名',
      prompt: g.latin,
      hint: '読み：' + g.read,
      hintHidden: true,
      photos: hasPhoto,
      fields: [{
        label: '科名を答えなさい',
        suffix: '科',
        answer: g.family.replace('科',''),
        altAnswers: g.oldFamily ? [g.oldFamily.replace('科','')] : [],
        type: 'family', inputmode: 'text'
      }]
    };
  }

  if (mode === 'jp2latin') {
    let prompt;
    if (jpInfo.pattern === 'B') {
      // 代表種名をヒントに（suffixなし）
      prompt = jpInfo.answers[1] || jpInfo.answers[0];
    } else {
      // 属和名をヒントに（suffixあり）
      prompt = jpInfo.answers[0] + jpInfo.suffix;
    }
    return {
      genus: g, mode,
      type: '和名→属名（ラテン語）',
      prompt: prompt,
      hint: '科名：' + g.family,
      hintHidden: true,
      photos: hasPhoto,
      fields: [{
        label: '属名（ラテン語）を答えなさい',
        suffix: '',
        answer: g.latin,
        altAnswers: [],
        type: 'latin', inputmode: 'latin'
      }]
    };
  }

  if (mode === 'latin2jp') {
    let label, hint2;
    if (jpInfo.pattern === 'C') {
      label = 'この属の一般名称を答えなさい';
      hint2 = 'カタカナで答えてください';
    } else if (jpInfo.pattern === 'B') {
      label = '属和名または代表種和名を一つ答えなさい';
      hint2 = 'どちらか一つでOK';
    } else {
      label = '属和名を答えなさい';
      hint2 = '';
    }
    return {
      genus: g, mode,
      type: '属名→属和名/代表種名',
      prompt: g.latin,
      hint: hint2,
      hintHidden: false,
      photos: hasPhoto,
      fields: [{
        label,
        suffix: jpInfo.suffix,
        answer: jpInfo.answers[0].replace('属',''),
        altAnswers: jpInfo.answers.slice(1).map(a => a.replace('属','')),
        type: 'jp', inputmode: 'text'
      }]
    };
  }

  if (mode === 'photo') {
    return {
      genus: g, mode,
      type: '写真→属名・科名',
      prompt: null, hint: '', hintHidden: false, photos: true,
      fields: [
        { label:'属名（ラテン語）を答えなさい', suffix:'', answer: g.latin, altAnswers:[], type:'latin', inputmode:'latin' },
        { label:'科名を答えなさい', suffix:'科', answer: g.family.replace('科',''), altAnswers: g.oldFamily?[g.oldFamily.replace('科','')]:[], type:'family', inputmode:'text' },
      ]
    };
  }
  return buildQ(g, 'latin2family');
}

function scoreFamilyAnswer(val, field) {
  if (!val) return 0;
  const v = val.trim().replace('科','');
  if (v === field.answer.replace('科','')) return 1;
  if (field.altAnswers && field.altAnswers.some(a => v === a.replace('科',''))) return 1;
  return 0;
}

function scoreJpAnswer(val, field) {
  if (!val) return 0;
  const v = val.trim().replace('属','');
  if (v === field.answer.replace('属','')) return 1;
  if (field.altAnswers && field.altAnswers.some(a => a && v === a.replace('属',''))) return 1;
  return 0;
}

function buildPhotoSwiper(wrap, photos) {
  let current = 0;
  const dotsHtml = photos.length > 1
    ? '<div class="quiz-photo-dots">'+photos.map((_,i) => '<div class="quiz-photo-dot'+(i===0?' active':'')+'"></div>').join('')+'</div>'
    : '';
  const countHtml = photos.length > 1 ? '<div class="quiz-photo-count">1 / '+photos.length+'</div>' : '';

  wrap.innerHTML =
    '<div class="quiz-photo-slide" id="photoSlide">'
    + photos.map(p => '<img src="'+p.dataUrl+'" loading="lazy">').join('')
    + '</div>'
    + dotsHtml + countHtml;

  if (photos.length <= 1) return;

  // スワイプ処理
  const slide = document.getElementById('photoSlide');
  let startX = 0;
  wrap.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, {passive:true});
  wrap.addEventListener('touchend', e => {
    const diff = startX - e.changedTouches[0].clientX;
    if (Math.abs(diff) < 40) return;
    if (diff > 0 && current < photos.length-1) current++;
    else if (diff < 0 && current > 0) current--;
    slide.style.transform = 'translateX(-'+current*100+'%)';
    wrap.querySelectorAll('.quiz-photo-dot').forEach((d,i) => d.classList.toggle('active', i===current));
    wrap.querySelector('.quiz-photo-count').textContent = (current+1)+' / '+photos.length;
  }, {passive:true});
}

function levenshtein(a, b) {
  const m=a.length, n=b.length;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i?j?0:j:i));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}
function spellScore(ans, correct) {
  if (!ans) return 0;
  const a=ans.trim().toLowerCase(), c=correct.trim().toLowerCase();
  if (a===c) return 1;
  return levenshtein(a,c)===1 ? 0.5 : 0;
}

function handleQuizAction() {
  if (quizState.answered) {
    quizState.current++;
    if (quizState.current >= quizState.questions.length) showResult();
    else renderQ();
    return;
  }
  quizState.answered = true;
  const q = quizState.questions[quizState.current];
  let lines = [], allOk = true, qScore = 0;

  q.fields.forEach((f,i) => {
    const inp = document.getElementById('ans_'+i);
    const val = inp ? inp.value : '';

    if (f.type === 'multi') {
      // 科名→属名列挙
      const fg = f.famGenera;
      const user = val.split(/[,、，\s]+/).map(s=>s.trim()).filter(Boolean);
      let fs=0, missed=[];
      fg.forEach(g => {
        const best = user.map(u=>spellScore(u,g.latin)).sort((a,b)=>b-a)[0]||0;
        fs += best/fg.length;
        if (best===0) { missed.push(g.latin); allOk=false; }
      });
      qScore += fs;
      inp.className = 'answer-input '+(missed.length===0?'correct':missed.length===fg.length?'wrong':'partial');
      lines.push('正解: '+fg.map(g=>g.latin).join('、'));
      if (missed.length) lines.push('未回答: '+missed.join('、'));

    } else if (f.type === 'latin') {
      // ラテン語属名：スペルミス1箇所で0.5点
      const s = spellScore(val, f.answer);
      qScore += s;
      if (s===1) { inp.className='answer-input correct'; lines.push('✅ '+f.label+': '+f.answer); }
      else if (s===0.5) { inp.className='answer-input partial'; lines.push('⚠️ '+f.label+': 正解は <span class="correct-ans">'+f.answer+'</span>（スペルミス→0.5点）'); allOk=false; }
      else { inp.className='answer-input wrong'; lines.push('❌ '+f.label+': 正解は <span class="correct-ans">'+f.answer+'</span>'); allOk=false; }

    } else if (f.type === 'family') {
      // 科名：APGまたは旧科名で正解
      const s = scoreFamilyAnswer(val, f);
      qScore += s;
      const allCorrect = f.altAnswers && f.altAnswers.length > 0
        ? f.answer + '（または ' + f.altAnswers.join('・') + '）'
        : f.answer;
      if (s===1) { inp.className='answer-input correct'; lines.push('✅ '+f.label+': '+f.answer); }
      else { inp.className='answer-input wrong'; lines.push('❌ '+f.label+': 正解は <span class="correct-ans">'+allCorrect+'</span>'); allOk=false; }

    } else if (f.type === 'jp') {
      // 属和名・代表種名：複数正解対応
      const s = scoreJpAnswer(val, f);
      qScore += s;
      const allCorrect = f.altAnswers && f.altAnswers.length > 0
        ? f.answer + '（または ' + f.altAnswers.join('・') + '）'
        : f.answer;
      if (s===1) { inp.className='answer-input correct'; lines.push('✅ '+f.label+': '+f.answer); }
      else { inp.className='answer-input wrong'; lines.push('❌ '+f.label+': 正解は <span class="correct-ans">'+allCorrect+'</span>'); allOk=false; }
    }
  });

  // 形式別正答率を記録
  const modeKey = q.mode || 'latin2family';
  if (!state.accuracy[q.genus.latin]) state.accuracy[q.genus.latin] = {};
  if (!state.accuracy[q.genus.latin][modeKey]) state.accuracy[q.genus.latin][modeKey] = {correct:0, total:0};
  state.accuracy[q.genus.latin][modeKey].total++;
  if (allOk) state.accuracy[q.genus.latin][modeKey].correct++;

  // 習熟度：全形式の平均正答率から計算
  const acc = state.accuracy[q.genus.latin];
  const modes = ['latin2family','jp2latin','latin2jp'];
  const tried = modes.filter(m => acc[m] && acc[m].total > 0);
  if (tried.length > 0) {
    const avg = tried.reduce((s,m) => s + acc[m].correct/acc[m].total, 0) / tried.length;
    state.mastery[q.genus.latin] = avg >= 0.8 ? 3 : avg >= 0.6 ? 2 : avg >= 0.3 ? 1 : 0;
  }
  state.todayCount++;
  saveProgress();

  const cls = allOk?'correct':qScore>0?'partial':'wrong';
  const fb = document.getElementById('feedbackBox');
  fb.className='feedback-box show '+cls;
  // 正解欄：「科」「属」を補完して表示
  const feedbackLines = lines.map(l => {
    return l.replace(/正解は <span class="correct-ans">([^<]+)<\/span>/g, (match, ans) => {
      if (q.fields.find(f => f.type==='family')) return '正解は <span class="correct-ans">'+ans+'科</span>';
      if (q.fields.find(f => f.type==='jp' && f.suffix==='属')) return '正解は <span class="correct-ans">'+ans+'属</span>';
      return match;
    });
  });
  fb.innerHTML = feedbackLines.join('<br>') + (q.genus.note?'<div class="feedback-note">📝 '+q.genus.note+'</div>':'');
  document.getElementById('quizActionBtn').textContent = quizState.current+1<quizState.questions.length?'次の問題 →':'結果を見る';
  document.getElementById('quizScoreLive').textContent = '';
}

  renderHome(); renderStats();
}

function renderZukan() {

  const s = zukanSearch.toLowerCase();
  const list = GENERA.filter(g => {
    if (s && !g.latin.toLowerCase().includes(s) && !g.jpName.includes(zukanSearch) && !g.family.includes(zukanSearch) && !g.read.includes(zukanSearch)) return false;
    if (zukanFilter==='unlocked') return !!state.unlocked[g.latin];
    if (zukanFilter==='locked') return !state.unlocked[g.latin];
  
    if (zukanFilter==='photo') return false; // 後でフィルタ
    return true;
  });

  // 同期で全カードを描画（写真はモーダルを開いたときに表示）
  // 写真があるかどうかはstate.photoCacheで管理
  grid.innerHTML = list.map(g => {
    const mastery = state.mastery[g.latin]||0;
    const hasPhoto = !!state.photoCache[g.latin];
    const jpBase = g.jpName.split('：')[0];
    const jpDisplay = jpBase.endsWith('属') ? jpBase : jpBase + '属';
    const photoArea = hasPhoto
      ? '<img src="'+state.photoCache[g.latin]+'" loading="lazy" style="width:100%;height:46px;object-fit:cover;border-radius:4px;flex-shrink:0;margin-bottom:4px">'
      : '<div style="width:100%;height:46px;background:rgba(0,0,0,.35);border-radius:6px;display:flex;align-items:center;justify-content:center;margin-bottom:4px"><div class="lock-icon-css"></div></div>';
    return '<div class="zukan-card '+(hasPhoto?'has-photo':'unlocked')+'" id="zc_'+g.latin+'" onclick="openDetail(\''+g.latin+'\')">'
      + '<div class="mastery-dot m'+mastery+'"></div>'
      + photoArea
      + '<div class="card-text">'
      + '<div class="card-latin">'+g.latin+'</div>'
      + '<div class="card-fam">'+g.family+'</div>'
      + '<div class="card-jp">'+jpDisplay+'</div>'
      + '</div>'
      + '</div>';
  }).join('');

  if (zukanFilter === 'photo') {
    list.forEach(g => {
      if (!state.photoCache[g.latin]) {
        const el = document.getElementById('zc_'+g.latin);
        if (el) el.style.display = 'none';
      }
    });
  }
}

function buildAccuracyBar(acc, modeKey, label) {
  const d = acc && acc[modeKey];
  if (!d || d.total === 0) {
    return '<div style="margin-bottom:8px">'
      + '<div style="font-size:10px;color:var(--text3);margin-bottom:3px">'+label+'</div>'
      + '<div style="font-size:10px;color:var(--text3)">未出題</div>'
      + '</div>';
  }
  const pct = d.correct / d.total;
  const barW = 140; // px
  const correctW = Math.round(pct * barW);
  const wrongW = barW - correctW;
  return '<div style="margin-bottom:8px">'
    + '<div style="font-size:10px;color:var(--text3);margin-bottom:3px">'+label+'</div>'
    + '<div style="display:flex;align-items:center;gap:6px">'
    + '<div style="display:flex;height:10px;border-radius:5px;overflow:hidden;width:'+barW+'px;flex-shrink:0">'
    + '<div style="width:'+correctW+'px;background:var(--accent)"></div>'
    + '<div style="width:'+wrongW+'px;background:var(--surface2);border:1px solid var(--border)"></div>'
    + '</div>'
    + '<span style="font-size:11px;color:var(--text2);white-space:nowrap">'+d.correct+'問正解 / '+d.total+'問</span>'
    + '</div>'
    + '</div>';
}

function buildAccuracySection(latin) {
  const acc = state.accuracy[latin];
  if (!acc) return '<div style="font-size:11px;color:var(--text3)">まだ出題されていません</div>';
  return buildAccuracyBar(acc, 'latin2family', '属名→科名')
    + buildAccuracyBar(acc, 'jp2latin', '和名→属名（ラテン語）')
    + buildAccuracyBar(acc, 'latin2jp', '属名→属和名/代表種名');
}

async function handlePhotoUpload(e) {
  const files = Array.from(e.target.files);
  if (!files.length || !currentGenus) return;
  const latin = currentGenus.latin;
  showToast('アップロード中… 📤');

  const existing = await dbGetPhotos(latin);
  for (const file of files) {
    try {
      // Exifから撮影日時・GPS取得（アップロード前に読む）
      let exifDate = null, exifLat = null, exifLng = null;
      if (typeof exifr !== 'undefined') {
        try {
          const exif = await exifr.parse(file, {
            tiff: true, exif: true, gps: true,
            pick: ['DateTimeOriginal', 'GPSLatitude', 'GPSLongitude', 'GPSLatitudeRef', 'GPSLongitudeRef']
          });
          if (exif) {
            if (exif.DateTimeOriginal) exifDate = new Date(exif.DateTimeOriginal);
            // exifrはlatitude/longitudeとして返すこともある
            const lat = exif.latitude || exif.GPSLatitude;
            const lng = exif.longitude || exif.GPSLongitude;
            if (lat && lng) { exifLat = lat; exifLng = lng; }
          }
        } catch(e) { console.warn('Exif parse error:', e); }
      }

      let url;
      if (currentUser) {
        url = await uploadToCloudinary(file);
      } else {
        url = await compressImage(file, 800, 0.75);
      }

      // 撮影日時を記録
      const photoDate = exifDate ? exifDate.toLocaleDateString('ja-JP') : new Date().toLocaleDateString('ja-JP');
      existing.push({ dataUrl: url, date: photoDate });
      if (!state.photoCache[latin]) state.photoCache[latin] = url;

      // 撮影場所（Exifから取得できた場合は毎回上書き）
      if (exifLat && exifLng) {
        state.location[latin] = { lat: exifLat, lng: exifLng };
        document.getElementById('mLocationText').textContent = '📍 撮影場所を記録済み（タップで地図）';
        console.log('Exif GPS取得成功:', exifLat, exifLng);
      } else {
        console.log('Exif GPSなし。位置情報は記録しません');
      }

    } catch(err) {
      showToast('アップロードに失敗しました ⚠️');
      continue;
    }
  }
  await dbSetPhotos(latin, existing);
  state.unlocked[latin] = true;

  await saveProgress();
  await renderMyPhotos(latin);
  renderZukan();
  renderHome();
  showToast(files.length + '枚追加しました 📷' + (loc ? '　📍 位置記録済み' : ''));
  e.target.value = '';
}

function compressImage(file, maxPx, quality) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      let w=img.width, h=img.height;
      if (w>maxPx||h>maxPx) { if(w>h){h=Math.round(h*maxPx/w);w=maxPx;}else{w=Math.round(w*maxPx/h);h=maxPx;} }
      const canvas = document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = url;
  });
}

async function deleteMyPhoto(e, idx) {
  e.stopPropagation();
  const latin = currentGenus.latin;
  const photos = await dbGetPhotos(latin);
  photos.splice(idx,1);
  await dbSetPhotos(latin, photos);
  // キャッシュ更新
  if (photos.length > 0) state.photoCache[latin] = photos[0].dataUrl;
  else delete state.photoCache[latin];
  await renderMyPhotos(latin);
  renderZukan();
}

let fsPhotos = [], fsCurrent = 0;

function viewPhotoUrl(url) {
  viewPhotos([url], 0);
}

function viewPhotos(urls, startIdx) {
  fsPhotos = urls;
  fsCurrent = startIdx || 0;
  const slide = document.getElementById('fullscreenSlide');
  slide.innerHTML = urls.map(u => '<img src="'+u+'" loading="lazy">').join('');
  slide.style.transform = 'translateX(-'+fsCurrent*100+'%)';
  const counter = document.getElementById('fullscreenCounter');
  if (urls.length > 1) {
    counter.style.display = 'block';
    counter.textContent = (fsCurrent+1) + ' / ' + urls.length;
  } else {
    counter.style.display = 'none';
  }
  const wrap = document.getElementById('fullscreenPhoto');
  wrap.classList.add('show');
  let sx = 0;
  const onStart = e => { sx = e.touches[0].clientX; };
  const onEnd = e => {
    const diff = sx - e.changedTouches[0].clientX;
    if (Math.abs(diff) < 40) return;
    if (diff > 0 && fsCurrent < fsPhotos.length-1) fsCurrent++;
    else if (diff < 0 && fsCurrent > 0) fsCurrent--;
    slide.style.transform = 'translateX(-'+fsCurrent*100+'%)';
    if (fsPhotos.length > 1) counter.textContent = (fsCurrent+1)+' / '+fsPhotos.length;
  };
  if (wrap._ts) wrap.removeEventListener('touchstart', wrap._ts);
  if (wrap._te) wrap.removeEventListener('touchend', wrap._te);
  wrap._ts = onStart; wrap._te = onEnd;
  wrap.addEventListener('touchstart', onStart, {passive:true});
  wrap.addEventListener('touchend', onEnd, {passive:true});
}

function closeFullscreen() { document.getElementById('fullscreenPhoto').classList.remove('show'); }

let _leafletMap = null;

function toggleMap() {
  const loc = currentGenus ? state.location[currentGenus.latin] : null;
  if (!loc) return;
  const mapArea = document.getElementById('mMapArea');
  if (mapArea.style.display === 'block') {
    mapArea.style.display = 'none';
    return;
  }
  mapArea.style.display = 'block';
  // 既存のマップを破棄
  if (_leafletMap) { _leafletMap.remove(); _leafletMap = null; }
  if (typeof L === 'undefined') {
    mapArea.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:12px">地図を読み込めませんでした</div>';
    return;
  }
  _leafletMap = L.map('mMapArea', { zoomControl: true, attributionControl: false })
    .setView([loc.lat, loc.lng], 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
  }).addTo(_leafletMap);
  const marker = L.marker([loc.lat, loc.lng]).addTo(_leafletMap);
  marker.bindPopup(
    currentGenus.latin + '<br>'
    + '<a href="https://maps.apple.com/?q='+loc.lat+','+loc.lng+'" target="_blank" style="color:#4a9">'
    + 'マップで開く</a>'
  ).openPopup();
  // マップのリサイズを確実に
  setTimeout(() => _leafletMap.invalidateSize(), 100);
}

function showMap(lat, lng) {
  const mapArea = document.getElementById('mMapArea');
  mapArea.style.display = 'block';
  if (_leafletMap) { _leafletMap.remove(); _leafletMap = null; }
  if (typeof L === 'undefined') return;
  _leafletMap = L.map('mMapArea', { zoomControl: true, attributionControl: false })
    .setView([lat, lng], 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(_leafletMap);
  L.marker([lat, lng]).addTo(_leafletMap)
    .bindPopup('<a href="https://maps.apple.com/?q='+lat+','+lng+'" target="_blank" style="color:#4a9">マップで開く</a>')
    .openPopup();
  setTimeout(() => _leafletMap.invalidateSize(), 100);
}

async function recordLocation() {
  if (!navigator.geolocation) { showToast('位置情報が使えません'); return; }
  navigator.geolocation.getCurrentPosition(async pos => {
    const {latitude:lat, longitude:lng} = pos.coords;
    state.location[currentGenus.latin] = {lat, lng};
    await saveProgress();
    document.getElementById('mLocationText').textContent = '📍 発見場所を記録済み（タップで地図）';
    showMap(lat, lng);
    showToast('現在地を記録しました 📍');
  }, () => showToast('位置情報の取得に失敗しました'));
}

// ========== STATS ==========
function renderStats() {
  const memorized = countMemorized();
  const weakCount = GENERA.filter(g => {
    const acc = state.accuracy[g.latin];
    if (!acc) return false;
    const modes = ['latin2family','jp2latin','latin2jp'];
    const tried = modes.filter(m => acc[m] && acc[m].total > 0);
    if (tried.length === 0) return false;
    const avg = tried.reduce((s,m) => s + acc[m].correct/acc[m].total, 0) / tried.length;
    return avg < 0.5;
  }).length;
  document.getElementById('statsGrid').innerHTML =
    '<div class="science-card"><div class="sc-label">記憶済み属</div><div class="sc-val">'+memorized+'</div><div class="sc-sub">/ 300属</div></div>'
    + '<div class="science-card"><div class="sc-label">苦手属</div><div class="sc-val">'+weakCount+'</div><div class="sc-sub">正答率50%未満</div></div>'
    + '<div class="science-card"><div class="sc-label">写真登録済み</div><div class="sc-val">'+Object.keys(state.photoCache).length+'</div><div class="sc-sub">属</div></div>'
    + '<div class="science-card"><div class="sc-label">今日の出題数</div><div class="sc-val">'+state.todayCount+'</div><div class="sc-sub">問</div></div>';
  // 全体の形式別正答率を集計
  const globalAcc = { latin2family:{correct:0,total:0}, jp2latin:{correct:0,total:0}, latin2jp:{correct:0,total:0} };
  Object.values(state.accuracy).forEach(acc => {
    if (!acc || typeof acc !== 'object') return;
    ['latin2family','jp2latin','latin2jp'].forEach(m => {
      if (acc[m]) {
        globalAcc[m].correct += acc[m].correct;
        globalAcc[m].total += acc[m].total;
      }
    });
  });
  const accEl = document.getElementById('statsAccuracy');
  if (accEl) {
    accEl.innerHTML =
      buildAccuracyBar(globalAcc, 'latin2family', '属名→科名')
      + buildAccuracyBar(globalAcc, 'jp2latin', '和名→属名（ラテン語）')
      + buildAccuracyBar(globalAcc, 'latin2jp', '属名→属和名/代表種名');
  }
  const histEl = document.getElementById('historyList');
  if (histEl) {
    histEl.innerHTML = state.history.length
      ? state.history.map(s =>
          '<div class="history-item"><div>'
          + '<div class="date">'+s.date+'</div>'
          + '<div class="hmode">'+s.mode+'　'+s.time+'</div>'
          + '</div><div class="score">'+s.total+'問</div></div>'
        ).join('')
      : '<div class="empty-state">まだ記録がありません。<br>練習を始めましょう 🌱</div>';
  }
}

// ========== NAV ==========
function showScreen(id, btn) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  if(id==='zukan') renderZukan();
  if(id==='stats') renderStats();
  if(id==='home') renderHome();
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

init();
