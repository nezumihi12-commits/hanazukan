<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>花図鑑 — 1000属検定C級</title>
<!-- Firebase SDK (compat版・scriptタグで読み込み) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1a14;
    --surface: #1a2a1f;
    --surface2: #223028;
    --border: #2e4a38;
    --accent: #5dba7a;
    --accent2: #a8e6bc;
    --warn: #e8a84a;
    --danger: #e85a5a;
    --text: #e8f0eb;
    --text2: #8aab95;
    --text3: #4a6b55;
    --gold: #d4af37;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }
  nav {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    order: 999;
  }
  nav button {
    flex: 1; padding: 12px 4px 10px;
    background: none; border: none; color: var(--text3);
    font-family: 'Shippori Mincho', serif; font-size: 12px;
    cursor: pointer; transition: color .2s;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
  }
  nav button .nav-icon { font-size: 20px; }
  nav button.active { color: var(--accent); }
  .screen { display: none; flex: 1; overflow-y: auto; flex-direction: column; }
  .screen.active { display: flex; }

  /* HOME */
  #home { padding: 20px 16px; gap: 16px; }
  .home-header { text-align: center; padding: 8px 0; }
  .home-header h1 { font-family: 'Shippori Mincho', serif; font-size: 24px; font-weight: 800; color: var(--accent2); }
  .home-header p { font-size: 11px; color: var(--text3); margin-top: 3px; letter-spacing: .08em; }
  .progress-ring-wrap { display: flex; justify-content: center; align-items: center; gap: 24px; }
  .ring-container { position: relative; width: 110px; height: 110px; }
  .ring-container svg { transform: rotate(-90deg); }
  .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring-center .num { font-family: 'Shippori Mincho', serif; font-size: 26px; font-weight: 800; color: var(--accent); }
  .ring-center .denom { font-size: 10px; color: var(--text3); }
  .ring-stats { display: flex; flex-direction: column; gap: 10px; }
  .stat-item .label { font-size: 10px; color: var(--text3); }
  .stat-item .value { font-size: 17px; color: var(--text); font-weight: 500; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
  .card-title { font-family: 'Shippori Mincho', serif; font-size: 12px; color: var(--text2); letter-spacing: .06em; margin-bottom: 10px; }
  .btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 14px; border-radius: var(--radius-sm); border: none; font-family: 'Shippori Mincho', serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity .15s, transform .1s; }
  .btn:active { opacity: .75; transform: scale(.98); }
  .btn-primary { background: var(--accent); color: #0f1a14; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .mode-btn { background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px 8px; color: var(--text); font-family: 'Shippori Mincho', serif; font-size: 12px; cursor: pointer; text-align: center; transition: all .2s; line-height: 1.4; }
  .mode-btn .mode-icon { font-size: 20px; display: block; margin-bottom: 4px; }
  .mode-btn.selected { border-color: var(--accent); background: #1e3a28; }
  .science-badge { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--surface2); border-radius: var(--radius-sm); border-left: 3px solid var(--gold); }
  .science-badge .info { font-size: 11px; color: var(--text2); line-height: 1.5; }
  .science-badge .info strong { color: var(--gold); }

  /* QUIZ */
  #quiz { padding: 0; }
  .quiz-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .quiz-progress-bar { height: 3px; background: var(--border); flex-shrink: 0; }
  .quiz-progress-fill { height: 100%; background: var(--accent); transition: width .3s; }
  .quiz-counter { font-size: 12px; color: var(--text2); }
  .quiz-score-live { font-size: 12px; color: var(--accent); font-weight: 500; }
  .quiz-exit { background: none; border: none; color: var(--text3); font-size: 20px; cursor: pointer; padding: 4px; }
  .quiz-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
  .question-type-badge { display: inline-block; font-size: 10px; letter-spacing: .1em; color: var(--text3); background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; align-self: flex-start; }
  .question-text { font-family: 'Shippori Mincho', serif; font-size: 20px; font-weight: 600; line-height: 1.5; }
  .question-hint { font-size: 12px; color: var(--text3); background: var(--surface2); border-radius: var(--radius-sm); padding: 8px 12px; line-height: 1.6; }
  .answer-fields { display: flex; flex-direction: column; gap: 10px; }
  .field-label { font-size: 11px; color: var(--text3); letter-spacing: .06em; margin-bottom: 4px; }
  .answer-input { width: 100%; background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: 'DM Mono', monospace; font-size: 16px; padding: 13px 12px; outline: none; transition: border-color .2s; -webkit-appearance: none; }
  .answer-input:focus { border-color: var(--accent); }
  .answer-input.correct { border-color: var(--accent); background: #1a3525; }
  .answer-input.partial { border-color: var(--warn); background: #2a2010; }
  .answer-input.wrong { border-color: var(--danger); background: #2a1515; }
  .feedback-box { border-radius: var(--radius-sm); padding: 12px; font-size: 13px; line-height: 1.7; display: none; }
  .feedback-box.show { display: block; }
  .feedback-box.correct { background: #1a3525; border: 1px solid var(--accent); }
  .feedback-box.partial { background: #2a2010; border: 1px solid var(--warn); }
  .feedback-box.wrong { background: #2a1515; border: 1px solid var(--danger); }
  .feedback-box .correct-ans { color: var(--accent2); font-weight: 500; }
  .feedback-note { font-size: 11px; color: var(--text3); margin-top: 6px; }
  .quiz-footer { padding: 12px 14px; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }

  /* RESULT */
  .result-screen { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 28px 20px; gap: 16px; position: absolute; inset: 0; background: var(--bg); overflow-y: auto; }
  .result-screen.show { display: flex; }
  .result-emoji { font-size: 52px; }
  .result-score-big { font-family: 'Shippori Mincho', serif; font-size: 48px; font-weight: 800; color: var(--accent); }
  .result-score-big span { font-size: 18px; color: var(--text2); }
  .result-detail { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; display: flex; flex-direction: column; gap: 8px; }
  .result-row { display: flex; justify-content: space-between; font-size: 13px; }
  .result-row .lbl { color: var(--text3); }
  .result-row .val { color: var(--text); }

  /* ZUKAN */
  #zukan { padding: 0; }
  .zukan-header { padding: 10px 14px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; }
  .zukan-search { width: 100%; background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; padding: 9px 12px; outline: none; }
  .zukan-search:focus { border-color: var(--accent); }
  .filter-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-chip { flex-shrink: 0; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); font-size: 12px; cursor: pointer; white-space: nowrap; transition: all .2s; }
  .filter-chip.active { background: var(--accent); color: #0f1a14; border-color: var(--accent); font-weight: 600; }
  .zukan-grid { flex: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; align-content: start; -webkit-overflow-scrolling: touch; }
  .zukan-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 6px; cursor: pointer; transition: border-color .2s, transform .1s; display: flex; flex-direction: column; align-items: center; gap: 4px; min-height: 85px; justify-content: center; position: relative; overflow: hidden; }
  .zukan-card:active { transform: scale(.95); }
  .zukan-card.has-photo { border-color: var(--accent2); }
  .zukan-card.has-inat { border-color: var(--border); background: #1a2a20; }
  .zukan-card.locked { opacity: .3; }
  .zukan-card .card-thumb { width: 100%; height: 50px; object-fit: cover; border-radius: 3px; }
  .zukan-card .card-latin { font-size: 9px; font-style: italic; color: var(--text2); text-align: center; line-height: 1.3; word-break: break-all; }
  .zukan-card .card-fam { font-family: 'Shippori Mincho', serif; font-size: 10px; color: var(--text3); text-align: center; }
  .zukan-card .lock-icon { font-size: 18px; color: var(--text3); }
  .mastery-dot { width: 5px; height: 5px; border-radius: 50%; position: absolute; top: 4px; left: 4px; }
  .mastery-dot.m0 { background: var(--text3); }
  .mastery-dot.m1 { background: var(--warn); }
  .mastery-dot.m2 { background: var(--accent); }
  .mastery-dot.m3 { background: var(--gold); }
  .photo-badge { position: absolute; top: 3px; right: 3px; font-size: 9px; background: rgba(0,0,0,.55); border-radius: 3px; padding: 1px 3px; color: var(--accent2); }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 100; align-items: flex-end; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal-sheet { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; max-height: 92dvh; overflow-y: auto; padding: 16px 18px 36px; display: flex; flex-direction: column; gap: 14px; animation: slideUp .22s ease; -webkit-overflow-scrolling: touch; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; align-self: center; margin-bottom: 2px; }
  .modal-latin { font-style: italic; font-size: 22px; color: var(--accent2); }
  .modal-sub { font-family: 'Shippori Mincho', serif; font-size: 13px; color: var(--text2); margin-top: -6px; }
  .modal-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .info-item { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px 11px; }
  .info-item .lbl { font-size: 10px; color: var(--text3); margin-bottom: 2px; }
  .info-item .val { font-size: 13px; color: var(--text); line-height: 1.4; }
  .info-item.full { grid-column: 1/-1; }
  .modal-note { font-size: 12px; color: var(--text2); background: var(--surface2); border-left: 3px solid var(--border); padding: 9px 12px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; line-height: 1.6; }

  /* PHOTOS */
  .section-label { font-size: 11px; color: var(--text3); letter-spacing: .06em; }
  .inat-photos { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
  .inat-photos::-webkit-scrollbar { display: none; }
  .inat-photo-wrap { flex-shrink: 0; position: relative; }
  .inat-photo { width: 90px; height: 90px; object-fit: cover; border-radius: var(--radius-sm); border: 1px solid var(--border); cursor: pointer; }
  .inat-badge { position: absolute; bottom: 3px; left: 3px; font-size: 9px; background: rgba(0,0,0,.7); color: #aaa; border-radius: 3px; padding: 1px 4px; }
  .inat-loading { font-size: 12px; color: var(--text3); padding: 8px 0; }

  .my-photos-grid { display: flex; gap: 6px; flex-wrap: wrap; }
  .my-photo-wrap { position: relative; width: 90px; height: 90px; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border); cursor: pointer; }
  .my-photo { width: 100%; height: 100%; object-fit: cover; }
  .photo-delete { position: absolute; top: 3px; right: 3px; background: rgba(0,0,0,.65); border: none; color: #fff; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .photo-add-btn { width: 90px; height: 90px; border: 1.5px dashed var(--border); border-radius: var(--radius-sm); background: var(--surface2); color: var(--text3); font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; flex-shrink: 0; }
  .photo-add-btn:active { border-color: var(--accent); color: var(--accent); }

  .source-row { display: flex; gap: 7px; }
  .source-link { flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px; padding: 9px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text2); font-size: 12px; text-decoration: none; }
  .location-row { display: flex; align-items: center; gap: 8px; background: var(--surface2); border-radius: var(--radius-sm); padding: 9px 11px; }
  .location-text { font-size: 12px; color: var(--text2); flex: 1; line-height: 1.4; }
  .location-btn { padding: 5px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text2); font-size: 11px; cursor: pointer; white-space: nowrap; }
  .mastery-row { display: flex; gap: 6px; }
  .mastery-btn { flex: 1; padding: 8px 4px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--surface2); color: var(--text2); font-size: 11px; cursor: pointer; text-align: center; transition: all .2s; line-height: 1.4; }
  .mastery-btn.active-m1 { border-color: var(--warn); color: var(--warn); background: #2a2010; }
  .mastery-btn.active-m2 { border-color: var(--accent); color: var(--accent); background: #1a3525; }
  .mastery-btn.active-m3 { border-color: var(--gold); color: var(--gold); background: #2a2010; }

  /* STATS */
  #stats { padding: 18px 14px; gap: 14px; }
  .stats-title { font-family: 'Shippori Mincho', serif; font-size: 17px; font-weight: 800; color: var(--accent2); }
  .science-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .science-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
  .science-card .sc-label { font-size: 10px; color: var(--text3); }
  .science-card .sc-val { font-family: 'Shippori Mincho', serif; font-size: 22px; font-weight: 800; color: var(--text); }
  .science-card .sc-sub { font-size: 11px; color: var(--text2); }
  .history-list { display: flex; flex-direction: column; gap: 7px; }
  .history-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 13px; display: flex; justify-content: space-between; align-items: center; }
  .history-item .date { font-size: 11px; color: var(--text3); }
  .history-item .score { font-size: 14px; color: var(--accent); font-weight: 500; }
  .history-item .hmode { font-size: 11px; color: var(--text2); }
  .empty-state { text-align: center; color: var(--text3); font-size: 13px; padding: 28px; line-height: 1.8; }
  .save-status { font-size: 10px; color: var(--text3); text-align: right; }

  /* FULLSCREEN */
  .fullscreen-photo { display: none; position: fixed; inset: 0; background: #000; z-index: 300; align-items: center; justify-content: center; }
  .fullscreen-photo.show { display: flex; }
  .fullscreen-photo img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .fullscreen-close { position: absolute; top: 16px; right: 16px; background: rgba(0,0,0,.6); border: none; color: #fff; font-size: 22px; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

  .toast { position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 7px 16px; font-size: 13px; color: var(--text); z-index: 200; opacity: 0; transition: opacity .3s; white-space: nowrap; pointer-events: none; }
  .toast.show { opacity: 1; }
  input[type="file"] { display: none; }
</style>
</head>
<body>

<div id="home" class="screen active">
  <div class="home-header">
    <h1>花図鑑</h1>
    <p>1000属検定 C級 学習アプリ</p>
  </div>
  <div class="progress-ring-wrap">
    <div class="ring-container">
      <svg width="110" height="110" viewBox="0 0 110 110">
        <circle cx="55" cy="55" r="46" fill="none" stroke="#2e4a38" stroke-width="9"/>
        <circle id="ringFill" cx="55" cy="55" r="46" fill="none" stroke="#5dba7a" stroke-width="9"
          stroke-dasharray="289" stroke-dashoffset="289" stroke-linecap="round"/>
      </svg>
      <div class="ring-center">
        <span class="num" id="unlockedCount">0</span>
        <span class="denom">/ 300属</span>
      </div>
    </div>
    <div class="ring-stats">
      <div class="stat-item"><div class="label">写真登録</div><div class="value" id="photoCount">0 属</div></div>
      <div class="stat-item"><div class="label">★★★習熟</div><div class="value" id="masteredCount">0 属</div></div>
      <div class="stat-item"><div class="label">今日</div><div class="value" id="todayCount">0 問</div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">出題モード</div>
    <div class="mode-grid" id="modeGrid">
      <button class="mode-btn selected" data-mode="latin2all" onclick="selectMode(this)"><span class="mode-icon">🔤</span>属名→科名・和名</button>
      <button class="mode-btn" data-mode="jp2latin" onclick="selectMode(this)"><span class="mode-icon">🌿</span>和名→属名</button>
      <button class="mode-btn" data-mode="family2genus" onclick="selectMode(this)"><span class="mode-icon">🌳</span>科名→属名列挙</button>
      <button class="mode-btn" data-mode="mixed" onclick="selectMode(this)"><span class="mode-icon">🎲</span>ランダム混合</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">対象絞り込み</div>
    <div class="mode-grid" id="targetGrid">
      <button class="mode-btn selected" data-target="all" onclick="selectTarget(this)"><span class="mode-icon">📚</span>全300属</button>
      <button class="mode-btn" data-target="unlocked" onclick="selectTarget(this)"><span class="mode-icon">🔓</span>解放済みのみ</button>
      <button class="mode-btn" data-target="weak" onclick="selectTarget(this)"><span class="mode-icon">💢</span>苦手のみ</button>
      <button class="mode-btn" data-target="nophoto" onclick="selectTarget(this)"><span class="mode-icon">📷</span>写真未登録</button>
    </div>
  </div>

  <button class="btn btn-primary" onclick="startQuiz()">🌸 練習する（20問）</button>
  <div class="science-badge">
    <div class="info"><strong>本番ルール適用中</strong><br>スペルミス1箇所→0.5点　200点満点・180点以上で合格</div>
  </div>
  <div class="save-status" id="saveStatus">💾 データはClaudeアカウントに保存されます</div>
</div>

<div id="quiz" class="screen" style="position:relative">
  <div class="quiz-header">
    <span class="quiz-counter" id="quizCounter">1 / 20</span>
    <span class="quiz-score-live" id="quizScoreLive">0.0 pt</span>
    <button class="quiz-exit" onclick="exitQuiz()">✕</button>
  </div>
  <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="quizProgressFill"></div></div>
  <div class="quiz-body" id="quizBody"></div>
  <div class="quiz-footer">
    <button class="btn btn-primary" id="quizActionBtn" onclick="handleQuizAction()">答え合わせ</button>
  </div>
  <div class="result-screen" id="resultScreen">
    <div class="result-emoji" id="resultEmoji">🌸</div>
    <div class="result-score-big" id="resultScore">0<span>/200</span></div>
    <div id="resultLabel" style="font-size:14px;color:var(--text2)"></div>
    <div class="result-detail" id="resultDetail"></div>
    <button class="btn btn-primary" onclick="finishQuiz()" style="width:100%">図鑑に戻る</button>
    <button class="btn btn-secondary" onclick="startQuiz()" style="width:100%">もう一回</button>
  </div>
</div>

<div id="zukan" class="screen">
  <div class="zukan-header">
    <input class="zukan-search" type="search" placeholder="属名・科名・和名で検索…" autocomplete="off" oninput="filterZukan(this.value)">
    <div class="filter-row">
      <button class="filter-chip active" onclick="setFilter(this,'all')">すべて</button>
      <button class="filter-chip" onclick="setFilter(this,'unlocked')">解放済み</button>
      <button class="filter-chip" onclick="setFilter(this,'photo')">写真あり</button>
      <button class="filter-chip" onclick="setFilter(this,'m3')">★★★</button>
      <button class="filter-chip" onclick="setFilter(this,'m2')">★★</button>
      <button class="filter-chip" onclick="setFilter(this,'m1')">★</button>
      <button class="filter-chip" onclick="setFilter(this,'locked')">未解放</button>
    </div>
  </div>
  <div class="zukan-grid" id="zukanGrid"></div>
</div>

<div id="stats" class="screen">
  <div class="stats-title">学習記録</div>
  <div class="science-grid" id="statsGrid"></div>
  <div class="card-title">セッション履歴</div>
  <div class="history-list" id="historyList"></div>
</div>

<nav>
  <button class="active" onclick="showScreen('home',this)"><span class="nav-icon">🏠</span>ホーム</button>
  <button onclick="showScreen('zukan',this)"><span class="nav-icon">📖</span>図鑑</button>
  <button onclick="showScreen('stats',this)"><span class="nav-icon">📊</span>記録</button>
</nav>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalIfOutside(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div class="modal-latin" id="mLatin"></div>
        <div class="modal-sub" id="mSub"></div>
      </div>
      <button onclick="closeModal()" style="background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;padding:4px">✕</button>
    </div>
    <div class="modal-info-grid" id="mInfoGrid"></div>

    <!-- 写真 -->
    <div>
      <div class="section-label" style="margin-bottom:6px">📷 写真</div>
      <div class="my-photos-grid" id="myPhotosGrid"></div>
    </div>

    <!-- 外部リンク（写真収集用） -->
    <div class="source-row" id="mSourceRow"></div>

    <div class="location-row">
      <span style="font-size:16px">📍</span>
      <span class="location-text" id="mLocationText">発見場所を記録</span>
      <button class="location-btn" onclick="recordLocation()">現在地取得</button>
    </div>

    <div>
      <div class="section-label" style="margin-bottom:6px">習熟度</div>
      <div class="mastery-row" id="mMasteryRow"></div>
    </div>
  </div>
</div>

<!-- FULLSCREEN -->
<div class="fullscreen-photo" id="fullscreenPhoto">
  <img id="fullscreenImg" src="" alt="">
  <button class="fullscreen-close" onclick="closeFullscreen()">✕</button>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="photoInput" accept="image/*" multiple onchange="handlePhotoUpload(event)">

// ========== INDEXED DB（写真専用） ==========
async function openPhotoDB() {
  return new Promise((res) => {  // rejectしない
    try {
      const req = indexedDB.open('hanazukan_photos', 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore('photos');
      req.onsuccess = e => { photoDB = e.target.result; res(); };
      req.onerror = () => { console.warn('IndexedDB開けず、写真機能は無効'); res(); };
    } catch(e) { console.warn('IndexedDB非対応'); res(); }
  });
}
function dbGetPhotos(latin) {
  if (!photoDB) return Promise.resolve([]);
  return new Promise(resolve => {
    try {
      const req = photoDB.transaction('photos','readonly').objectStore('photos').get(latin);
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => resolve([]);
    } catch(e) { resolve([]); }
  });
}
function dbSetPhotos(latin, photos) {
  if (!photoDB) return Promise.resolve();
  return new Promise(resolve => {
    try {
      const tx = photoDB.transaction('photos','readwrite');
      tx.objectStore('photos').put(photos, latin);
      tx.oncomplete = resolve;
      tx.onerror = resolve;
    } catch(e) { resolve(); }
  });
}

      }
    });
    return true;
  } catch(e) {

// ========== FIRESTORE 保存・読み込み ==========
async function saveToFirestore() {
  if (!currentUser || !firebaseDb) {
    localStorage.setItem('hanazukan_progress', JSON.stringify({
      unlocked: state.unlocked,
      mastery: state.mastery,
      location: state.location,
      history: state.history,
      accuracy: state.accuracy,
      todayCount: state.todayCount,
      todayDate: state.todayDate,
    }));
    const el = document.getElementById('saveStatus');
    if (el && el.tagName !== 'BUTTON') el.textContent = '💾 ローカル保存済み（未ログイン）';
    return;
  }
  try {
    await firebaseDb.collection('users').doc(currentUser.uid).set({
      unlocked: state.unlocked,
      mastery: state.mastery,
      location: state.location,
      history: state.history.slice(0, 20),
      accuracy: state.accuracy,
      todayCount: state.todayCount,
      todayDate: state.todayDate,
      updatedAt: new Date().toISOString(),
    });
    document.getElementById('saveStatus').textContent = '☁️ ' + new Date().toLocaleTimeString('ja-JP') + ' 保存済み';
  } catch(e) {
    document.getElementById('saveStatus').textContent = '⚠️ 保存エラー';
  }
}

async function loadFromFirestore() {
  if (!currentUser || !firebaseDb) return;
  try {
    const snap = await firebaseDb.collection('users').doc(currentUser.uid).get();
    if (snap.exists) {
      Object.assign(state, snap.data());
      // photoCacheをIndexedDBから再構築
      if (photoDB) {
        for (const g of GENERA) {
          const p = await dbGetPhotos(g.latin);
          if (p.length > 0) state.photoCache[g.latin] = p[0].dataUrl;
        }
      }
      renderHome(); renderZukan(); renderStats();
      showToast('クラウドから読み込みました ☁️');
    } else {
      // Firestoreにデータなし→localStorageから移行
      const local = localStorage.getItem('hanazukan_progress');
      if (local) {
        try {
          Object.assign(state, JSON.parse(local));
          await saveToFirestore();
          showToast('ローカルデータをクラウドに移行しました ☁️');
        } catch(e) {}
      }
    }
  } catch(e) {}
}

async function saveProgress() {
  await saveToFirestore();
}

// ========== CLOUDINARY 写真アップロード ==========
async function uploadToCloudinary(file) {
  const compressed = await compressImage(file, 800, 0.75);
  const res = await fetch(compressed);
  const blob = await res.blob();
  const formData = new FormData();
  formData.append('file', blob);
  formData.append('upload_preset', CLOUDINARY_PRESET);
  formData.append('folder', 'hanazukan');
  const r = await fetch('https://api.cloudinary.com/v1_1/' + CLOUDINARY_CLOUD + '/image/upload', {
    method: 'POST', body: formData,
  });
  const data = await r.json();
  if (data.secure_url) return data.secure_url;
  throw new Error('Cloudinary upload failed');
}

// ========== INIT ==========
async function init() {
  try { await openPhotoDB(); } catch(e) { console.warn('DB init failed', e); }

  // localStorageからとりあえず読み込み（Firebase読み込み前の暫定）
  const local = localStorage.getItem('hanazukan_progress');
  if (local) try { Object.assign(state, JSON.parse(local)); } catch(e) {}

  const today = new Date().toDateString();
  if (state.todayDate !== today) { state.todayCount = 0; state.todayDate = today; }

  renderHome();
  renderZukan();
  renderStats();

  // IndexedDBからphotoCacheを再構築
  if (photoDB) {
    (async () => {
      for (const g of GENERA) {
        const p = await dbGetPhotos(g.latin);
        if (p.length > 0) state.photoCache[g.latin] = p[0].dataUrl;
      }
      renderZukan();
      renderHome();
    })();
  }

  // Firebase初期化（GitHub Pages上でのみ動作）
  try {
    await initFirebase();
  } catch(e) {
    // Artifact環境では失敗するが無視
  }
}

// ========== HOME ==========
function renderHome() {
  const unlocked = Object.keys(state.unlocked).length;
  const mastered = Object.values(state.mastery).filter(v => v >= 3).length;
  // 写真登録数はIndexedDBから同期的に取れないので近似（unlockedで代用）
  document.getElementById('unlockedCount').textContent = unlocked;
  document.getElementById('masteredCount').textContent = mastered + ' 属';
  document.getElementById('todayCount').textContent = state.todayCount + ' 問';
  const pct = unlocked / 300;
  document.getElementById('ringFill').style.strokeDashoffset = 289 - 289 * pct;
  // 写真数を非同期で更新
  document.getElementById('photoCount').textContent = countPhotos() + ' 属';
}
function countPhotos() {
  return Object.keys(state.photoCache).length;
}

// noteを種類別に分類
function parseNote(note) {
  const r = { species:[], confusion:[], circulation:[], taxonomy:[], warning:[] };
  if (!note) return r;
  for (const part of note.split('。').map(s=>s.trim()).filter(Boolean)) {
    if (/[ァ-ヶー]+は[A-Z]/.test(part) || /は別属/.test(part)) r.confusion.push(part);
    else if (/の名で流通|旧属名/.test(part)) r.circulation.push(part);
    else if (/から分けられた|とされた|とする見解|以前は|旧版/.test(part)) r.taxonomy.push(part);
    else if (/は不可/.test(part)) r.warning.push(part);
    else if (/[ァ-ヶー]/.test(part)) r.species.push(part);
  }
  return r;
}

// ========== QUIZ ==========
function getPool() {
  let pool = [...GENERA];
  if (selectedTarget === 'unlocked') pool = pool.filter(g => state.unlocked[g.latin]);
  else if (selectedTarget === 'weak') pool = pool.filter(g => (state.mastery[g.latin]||0) <= 1);
  if (pool.length === 0) pool = [...GENERA];
  return pool;
}

function startQuiz() {
  document.getElementById('resultScreen').classList.remove('show');
  showScreen('quiz', null);
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  const pool = getPool().sort(() => Math.random()-.5).slice(0,20);
  const modes = selectedMode === 'mixed' ? ['latin2all','jp2latin','family2genus'] : [selectedMode];
  quizState = {
    questions: pool.map(g => buildQ(g, modes[Math.floor(Math.random()*modes.length)])),
    current: 0, score: 0, answered: false, startTime: Date.now()
  };
  renderQ();
}

function buildQ(g, mode) {
  if (mode === 'jp2latin') return { genus:g, type:'和名→属名（ラテン語）', prompt:g.jpName, hint:`科名：${g.family}　読み：${g.read}`, fields:[{label:'属名（ラテン語）',answer:g.latin}] };
  if (mode === 'family2genus') {
    const fg = GENERA.filter(x=>x.family===g.family);
    return { genus:g, type:'科名→属名列挙', prompt:g.family, hint:`C級リストで ${fg.length} 属あります`, fields:[{label:'この科の属名をすべて（ラテン語）',answer:fg.map(x=>x.latin).join('、'),multi:true,famGenera:fg}] };
  }
  return { genus:g, type:'属名→科名・属和名', prompt:g.latin, hint:`読み：${g.read}`, fields:[{label:'科名（APG）',answer:g.family},{label:'属和名（または代表種名）',answer:g.jpName}] };
}

function renderQ() {
  const q = quizState.questions[quizState.current];
  const tot = quizState.questions.length;
  document.getElementById('quizCounter').textContent = `${quizState.current+1} / ${tot}`;
  document.getElementById('quizScoreLive').textContent = quizState.score.toFixed(1)+' pt';
  document.getElementById('quizProgressFill').style.width = (quizState.current/tot*100)+'%';
  document.getElementById('quizActionBtn').textContent = '答え合わせ';
  quizState.answered = false;
  let html = `<span class="question-type-badge">${q.type}</span>
    <div class="question-text">${q.prompt}</div>
    <div class="question-hint">${q.hint}</div>
    <div class="answer-fields">`;
  q.fields.forEach((f,i) => {
    html += `<div><div class="field-label">${f.label}</div>
      <input class="answer-input" id="ans_${i}" type="text"
        autocorrect="off" autocapitalize="off" spellcheck="false"
        placeholder="${f.multi?'カンマ区切りで入力':''}"></div>`;
  });
  html += `</div><div class="feedback-box" id="feedbackBox"></div>`;
  document.getElementById('quizBody').innerHTML = html;
  setTimeout(() => document.getElementById('ans_0')?.focus(), 80);
}

function levenshtein(a, b) {
  const m=a.length, n=b.length;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i?j?0:j:i));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}
function spellScore(ans, correct) {
  if (!ans) return 0;
  const a=ans.trim().toLowerCase(), c=correct.trim().toLowerCase();
  if (a===c) return 1;
  return levenshtein(a,c)===1 ? 0.5 : 0;
}

function handleQuizAction() {
  if (quizState.answered) {
    quizState.current++;
    if (quizState.current >= quizState.questions.length) showResult();
    else renderQ();
    return;
  }
  quizState.answered = true;
  const q = quizState.questions[quizState.current];
  let lines = [], allOk = true, qScore = 0;

  q.fields.forEach((f,i) => {
    const inp = document.getElementById(`ans_${i}`);
    const val = inp.value;
    if (f.multi) {
      const fg = f.famGenera;
      const user = val.split(/[,、，\s]+/).map(s=>s.trim()).filter(Boolean);
      let fs=0, missed=[];
      fg.forEach(g => {
        const best = user.map(u=>spellScore(u,g.latin)).sort((a,b)=>b-a)[0]||0;
        fs += best/fg.length;
        if (best===0) { missed.push(g.latin); allOk=false; }
      });
      qScore += fs;
      inp.className = 'answer-input '+(missed.length===0?'correct':missed.length===fg.length?'wrong':'partial');
      lines.push(`正解: ${fg.map(g=>g.latin).join('、')}`);
      if (missed.length) lines.push(`未回答: ${missed.join('、')}`);
    } else {
      const s = spellScore(val, f.answer);
      qScore += s;
      if (s===1) { inp.className='answer-input correct'; lines.push(`✅ ${f.label}: ${f.answer}`); }
      else if (s===0.5) { inp.className='answer-input partial'; lines.push(`⚠️ ${f.label}: 正解は <span class="correct-ans">${f.answer}</span>（スペルミス→0.5点）`); allOk=false; }
      else { inp.className='answer-input wrong'; lines.push(`❌ ${f.label}: 正解は <span class="correct-ans">${f.answer}</span>`); allOk=false; }
    }
  });

  const norm = (qScore/q.fields.length)*(200/quizState.questions.length);
  quizState.score += norm;
  state.unlocked[q.genus.latin] = true;
  // 正答率トラッキング
  if (!state.accuracy[q.genus.latin]) state.accuracy[q.genus.latin] = {correct:0, total:0};
  state.accuracy[q.genus.latin].total++;
  if (allOk) state.accuracy[q.genus.latin].correct++;
  state.mastery[q.genus.latin] = allOk
    ? Math.min(3,(state.mastery[q.genus.latin]||0)+1)
    : qScore===0 ? Math.max(0,(state.mastery[q.genus.latin]||0)-1)
    : (state.mastery[q.genus.latin]||0);
  state.todayCount++;
  saveProgress();

  const cls = allOk?'correct':qScore>0?'partial':'wrong';
  const fb = document.getElementById('feedbackBox');
  fb.className='feedback-box show '+cls;
  fb.innerHTML = lines.join('<br>') + (q.genus.note?`<div class="feedback-note">📝 ${q.genus.note}</div>`:'');
  document.getElementById('quizActionBtn').textContent = quizState.current+1<quizState.questions.length?'次の問題 →':'結果を見る';
  document.getElementById('quizScoreLive').textContent = quizState.score.toFixed(1)+' pt';
}

function showResult() {
  const elapsed = Math.round((Date.now()-quizState.startTime)/1000);
  const score = Math.min(200, Math.round(quizState.score*10)/10);
  const pass = score >= 180;
  document.getElementById('resultScreen').classList.add('show');
  document.getElementById('resultEmoji').textContent = pass?'🌸':score>=140?'🌿':'🌱';
  document.getElementById('resultScore').innerHTML = `${score.toFixed(1)}<span>/200</span>`;
  document.getElementById('resultLabel').textContent = pass?'合格ライン達成！🎉':'次回も頑張ろう！';
  const min=Math.floor(elapsed/60), sec=elapsed%60;
  document.getElementById('resultDetail').innerHTML = `
    <div class="result-row"><span class="lbl">所要時間</span><span class="val">${min}分${sec}秒</span></div>
    <div class="result-row"><span class="lbl">出題数</span><span class="val">${quizState.questions.length}問</span></div>
    <div class="result-row"><span class="lbl">合格ライン</span><span class="val">180点以上</span></div>
    <div class="result-row"><span class="lbl">今日の累計</span><span class="val">${state.todayCount}問</span></div>`;
  state.history.unshift({date:new Date().toLocaleDateString('ja-JP'),score,mode:selectedMode,time:`${min}分${sec}秒`});
  if(state.history.length>20) state.history.pop();
  saveProgress();
  renderHome(); renderStats();
}

function finishQuiz() { showScreen('home', document.querySelector('nav button:nth-child(1)')); renderHome(); renderZukan(); }
function exitQuiz() { showScreen('home', document.querySelector('nav button:nth-child(1)')); renderHome(); }

// ========== ZUKAN ==========
function renderZukan() {
  const grid = document.getElementById('zukanGrid');
  const s = zukanSearch.toLowerCase();
  const list = GENERA.filter(g => {
    if (s && !g.latin.toLowerCase().includes(s) && !g.jpName.includes(zukanSearch) && !g.family.includes(zukanSearch) && !g.read.includes(zukanSearch)) return false;
    if (zukanFilter==='unlocked') return !!state.unlocked[g.latin];
    if (zukanFilter==='locked') return !state.unlocked[g.latin];
    if (zukanFilter==='m3') return (state.mastery[g.latin]||0)>=3;
    if (zukanFilter==='m2') return (state.mastery[g.latin]||0)===2;
    if (zukanFilter==='m1') return (state.mastery[g.latin]||0)===1;
    if (zukanFilter==='photo') return false; // 後でフィルタ
    return true;
  });

  // 同期で全カードを描画（写真はモーダルを開いたときに表示）
  // 写真があるかどうかはstate.photoCacheで管理
  grid.innerHTML = list.map(g => {
    const mastery = state.mastery[g.latin]||0;
    const hasPhoto = !!state.photoCache[g.latin];
    return `<div class="zukan-card ${hasPhoto?'has-photo':'unlocked'}" id="zc_${g.latin}" onclick="openDetail('${g.latin}')">
      <div class="mastery-dot m${mastery}"></div>
      ${hasPhoto ? `<img class="card-thumb" src="${state.photoCache[g.latin]}" loading="lazy">` : ''}
      <div class="card-latin">${g.latin}</div>
      <div class="card-fam">${g.family.replace('科','')}</div>
    </div>`;
  }).join('');

  if (zukanFilter === 'photo') {
    list.forEach(g => {
      if (!state.photoCache[g.latin]) {
        const el = document.getElementById('zc_'+g.latin);
        if (el) el.style.display = 'none';
      }
    });
  }
}

function filterZukan(val) { zukanSearch=val; renderZukan(); }
function setFilter(btn, f) {
  document.querySelectorAll('.filter-chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  zukanFilter=f; renderZukan();
}

async function openDetail(latin) {
  try {
    const g = GENERA.find(x=>x.latin===latin);
    if (!g) return;
    currentGenus = g;

    document.getElementById('mLatin').textContent = g.latin;
    document.getElementById('mSub').textContent = g.read + '\u3000' + g.family;

    const parsed = parseNote(g.note);
    const noteRows = [
      parsed.species.length    ? '<div class="info-item full"><div class="lbl">代表種・園芸品種</div><div class="val" style="font-size:12px;line-height:1.7">'+parsed.species.join('\u3000')+'</div></div>' : '',
      parsed.confusion.length  ? '<div class="info-item full"><div class="lbl">⚠️ 混同注意</div><div class="val" style="font-size:12px;line-height:1.7;color:var(--warn)">'+parsed.confusion.join('\u3000')+'</div></div>' : '',
      parsed.circulation.length? '<div class="info-item full"><div class="lbl">📦 流通名</div><div class="val" style="font-size:12px;line-height:1.7">'+parsed.circulation.join('\u3000')+'</div></div>' : '',
      parsed.taxonomy.length   ? '<div class="info-item full"><div class="lbl">🔬 分類補足</div><div class="val" style="font-size:12px;line-height:1.7;color:var(--text2)">'+parsed.taxonomy.join('\u3000')+'</div></div>' : '',
      parsed.warning.length    ? '<div class="info-item full"><div class="lbl">🚫 注意事項</div><div class="val" style="font-size:12px;line-height:1.7;color:var(--danger)">'+parsed.warning.join('\u3000')+'</div></div>' : '',
    ].filter(Boolean).join('');

    let infoHtml = '<div class="info-item"><div class="lbl">科名（APG）</div><div class="val">'+g.family+'</div></div>';
    infoHtml += '<div class="info-item"><div class="lbl">属和名・代表種</div><div class="val">'+g.jpName+'</div></div>';
    if (g.oldFamily) infoHtml += '<div class="info-item"><div class="lbl">旧科名</div><div class="val">'+g.oldFamily+'</div></div>';
    // 正答率
    const acc = state.accuracy[g.latin];
    if (acc && acc.total > 0) {
      const pct = Math.round(acc.correct/acc.total*100);
      infoHtml += '<div class="info-item"><div class="lbl">正答率</div><div class="val" style="color:'+(pct>=80?'var(--accent)':pct>=50?'var(--warn)':'var(--danger)')+'">'+pct+'% ('+acc.correct+'/'+acc.total+')</div></div>';
    }
    infoHtml += noteRows;
    document.getElementById('mInfoGrid').innerHTML = infoHtml;

    document.getElementById('modalOverlay').classList.add('show');
    // モーダルを先頭にスクロール
    document.getElementById('modalOverlay').querySelector('.modal-sheet').scrollTop = 0;

    await renderMyPhotos(g.latin);

    const wikiKey = WIKI_KEYS[g.latin] || g.latin;
    document.getElementById('mSourceRow').innerHTML =
      '<a class="source-link" href="https://ja.wikipedia.org/wiki/'+encodeURIComponent(wikiKey)+'" target="_blank">📖 Wiki<br><span style="font-size:9px;color:var(--text3)">'+wikiKey+'</span></a>' +
      '<a class="source-link" href="https://www.inaturalist.org/taxa/search?q='+encodeURIComponent(g.latin)+'&rank=genus" target="_blank">🔍 iNat<br><span style="font-size:9px;color:var(--text3)">'+g.latin+'</span></a>' +
      '<a class="source-link" href="https://powo.science.kew.org/taxon/search?q='+encodeURIComponent(g.latin)+'" target="_blank">🌐 POWO<br><span style="font-size:9px;color:var(--text3)">'+g.latin+'</span></a>';

    const loc = state.location[g.latin];
    document.getElementById('mLocationText').textContent = loc
      ? '📍 ' + (loc.label || (loc.lat.toFixed(4) + ', ' + loc.lng.toFixed(4)))
      : '発見場所を記録';

    const mastery = state.mastery[g.latin]||0;
    document.getElementById('mMasteryRow').innerHTML = [
      {l:'未',m:0,icon:'○'},{l:'★',m:1,icon:'★'},{l:'★★',m:2,icon:'★★'},{l:'★★★',m:3,icon:'★★★'}
    ].map(function(item) {
      return '<button class="mastery-btn '+(mastery===item.m?'active-m'+item.m:'')+'" onclick="setMastery(\''+g.latin+'\','+item.m+')">'+item.icon+'<br>'+item.l+'</button>';
    }).join('');
  } catch(err) {
    console.warn('openDetail error:', err.message);
  }
}

async function renderMyPhotos(latin) {
  const photos = await dbGetPhotos(latin);
  document.getElementById('myPhotosGrid').innerHTML =
    photos.map((p,i) =>
      `<div class="my-photo-wrap" onclick="viewPhotoUrl('${p.dataUrl}')">
        <img class="my-photo" src="${p.dataUrl}">
        <button class="photo-delete" onclick="deleteMyPhoto(event,${i})">×</button>
      </div>`
    ).join('') +
    `<button class="photo-add-btn" onclick="document.getElementById('photoInput').click()">＋</button>`;
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); renderZukan(); renderHome(); }
function closeModalIfOutside(e) { if(e.target===document.getElementById('modalOverlay')) closeModal(); }

// 写真アップロード：Cloudinary（ログイン時）またはIndexedDB（未ログイン時）
async function handlePhotoUpload(e) {
  const files = Array.from(e.target.files);
  if (!files.length || !currentGenus) return;
  const latin = currentGenus.latin;
  showToast('アップロード中… 📤');

  const existing = await dbGetPhotos(latin);
  for (const file of files) {
    try {
      let url;
      if (currentUser) {
        url = await uploadToCloudinary(file);
      } else {
        url = await compressImage(file, 800, 0.75);
      }
      existing.push({ dataUrl: url });
      if (!state.photoCache[latin]) state.photoCache[latin] = url;
    } catch(err) {
      showToast('アップロードに失敗しました ⚠️');
      continue;
    }
  }
  await dbSetPhotos(latin, existing);
  state.unlocked[latin] = true;
  await saveProgress();
  await renderMyPhotos(latin);
  renderZukan();
  renderHome();
  showToast(files.length + '枚追加しました 📷');
  e.target.value = '';
}

function compressImage(file, maxPx, quality) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      let w=img.width, h=img.height;
      if (w>maxPx||h>maxPx) { if(w>h){h=Math.round(h*maxPx/w);w=maxPx;}else{w=Math.round(w*maxPx/h);h=maxPx;} }
      const canvas = document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = url;
  });
}

async function deleteMyPhoto(e, idx) {
  e.stopPropagation();
  const latin = currentGenus.latin;
  const photos = await dbGetPhotos(latin);
  photos.splice(idx,1);
  await dbSetPhotos(latin, photos);
  // キャッシュ更新
  if (photos.length > 0) state.photoCache[latin] = photos[0].dataUrl;
  else delete state.photoCache[latin];
  await renderMyPhotos(latin);
  renderZukan();
}

function viewPhotoUrl(url) {
  document.getElementById('fullscreenImg').src = url;
  document.getElementById('fullscreenPhoto').classList.add('show');
}
function closeFullscreen() { document.getElementById('fullscreenPhoto').classList.remove('show'); }

async function setMastery(latin, val) {
  state.mastery[latin]=val;
  await saveProgress();
  openDetail(latin);
}

async function recordLocation() {
  if (!navigator.geolocation) { showToast('位置情報が使えません'); return; }
  navigator.geolocation.getCurrentPosition(async pos => {
    const {latitude:lat, longitude:lng} = pos.coords;
    state.location[currentGenus.latin] = {lat, lng};
    await saveProgress();
    document.getElementById('mLocationText').textContent = `📍 ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
    showToast('現在地を記録しました 📍');
  }, () => showToast('位置情報の取得に失敗しました'));
}

// ========== STATS ==========
function renderStats() {
  const unlocked = Object.keys(state.unlocked).length;
  const m3 = Object.values(state.mastery).filter(v=>v>=3).length;
  const best = state.history.length ? Math.max(...state.history.map(h=>h.score)) : 0;
  document.getElementById('statsGrid').innerHTML = `
    <div class="science-card"><div class="sc-label">解放済み属</div><div class="sc-val">${unlocked}</div><div class="sc-sub">/ 300属</div></div>
    <div class="science-card"><div class="sc-label">★★★習熟</div><div class="sc-val">${m3}</div><div class="sc-sub">属</div></div>
    <div class="science-card"><div class="sc-label">最高スコア</div><div class="sc-val">${best.toFixed(1)}</div><div class="sc-sub">/ 200点</div></div>
    <div class="science-card"><div class="sc-label">今日</div><div class="sc-val">${state.todayCount}</div><div class="sc-sub">問</div></div>`;
  const h = document.getElementById('historyList');
  h.innerHTML = state.history.length
    ? state.history.map(s=>`<div class="history-item"><div><div class="date">${s.date}</div><div class="hmode">${s.mode}　${s.time}</div></div><div class="score">${parseFloat(s.score).toFixed(1)} pt</div></div>`).join('')
    : '<div class="empty-state">まだ記録がありません。<br>練習を始めましょう 🌱</div>';
}

// ========== NAV ==========
function showScreen(id, btn) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  if(id==='zukan') renderZukan();
  if(id==='stats') renderStats();
  if(id==='home') renderHome();
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

init();
</script>
